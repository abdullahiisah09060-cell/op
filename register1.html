<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Security Onboarding - Phase 1</title>
    
    <!-- Core Assets -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: radial-gradient(circle at top, var(--sba-blue-light), var(--bg-dark));
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .step-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
        }

        .step-dot {
            height: 4px;
            flex: 1;
            background: var(--border-glass);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .step-dot.active::after {
            content: '';
            position: absolute;
            left: 0; top: 0; height: 100%; width: 100%;
            background: var(--sba-accent);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
        }

        .input-error {
            color: var(--danger);
            font-size: 11px;
            font-weight: 700;
            margin-top: 5px;
            display: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Small Header -->
    <nav class="nav-header" style="background: transparent; border: none; position: absolute; top: 0; width: 100%;">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <div style="background: white; color: var(--sba-blue); padding: 4px 8px; font-weight: 900; border-radius: 3px; font-size: 14px;">SBA</div>
            <span style="font-size: 10px; font-weight: 800; letter-spacing: 1px; color: white;">SECURE PORTAL</span>
        </div>
        <a href="login.html" style="color: var(--text-white); font-size: 12px; font-weight: 700; text-decoration: none;">LOG IN</a>
    </nav>

    <main class="app-container animate-up">
        <div class="card">
            <!-- Progress -->
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
            </div>

            <div style="margin-bottom: 25px;">
                <h2 style="margin-bottom: 5px; font-size: 24px;">Initialize Account</h2>
                <p style="font-size: 13px;">Phase 1: Setup security credentials.</p>
            </div>

            <!-- Google Integration -->
            <button type="button" id="googleBtn" class="btn btn-secondary" style="margin-bottom: 20px; font-size: 14px;">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" style="margin-right: 10px;">
                Continue with Google
            </button>

            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <hr style="flex: 1; opacity: 0.1;">
                <span style="font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 1px;">OR MANUAL ENROLLMENT</span>
                <hr style="flex: 1; opacity: 0.1;">
            </div>

            <form id="regForm1">
                <div class="form-group">
                    <label class="form-label">Government / Business Email</label>
                    <input type="email" id="email" placeholder="e.g. director@company.com" required>
                    <div id="emailError" class="input-error">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Access Key (Password)</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Minimum 8 characters" required>
                        <i class="fas fa-eye toggle-pass" onclick="toggleVisibility('password')"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Access Key</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm" placeholder="Repeat access key" required>
                        <i class="fas fa-eye toggle-pass" onclick="toggleVisibility('confirm')"></i>
                    </div>
                    <div id="passError" class="input-error">Keys do not match</div>
                </div>

                <div style="margin: 20px 0;">
                    <label style="display: flex; gap: 10px; cursor: pointer;">
                        <input type="checkbox" required style="width: 18px; height: 18px; margin: 0; accent-color: var(--sba-accent);">
                        <span style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">
                            I certify that the information provided is accurate and I agree to the 
                            <a href="#" style="color: var(--sba-accent);">SBA Federal Data Privacy Terms</a>.
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Proceed to Details <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>

        <p class="text-center" style="font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            <i class="fas fa-lock" style="margin-right: 5px;"></i> AES-256 Encrypted Connection
        </p>
    </main>

    <script type="module">
        import { auth, saveRegistrationStep } from './firebase-config.js';
        import { GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const form = document.getElementById('regForm1');
        const submitBtn = document.getElementById('submitBtn');

        // Toggle Password Visibility
        window.toggleVisibility = (id) => {
            const el = document.getElementById(id);
            const icon = el.nextElementSibling;
            if (el.type === 'password') {
                el.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        // Form Submission
        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const passError = document.getElementById('passError');

            if (password !== confirm) {
                passError.style.display = 'block';
                return;
            }

            submitBtn.classList.add('btn-loading');
            
            // Save to shared session object
            saveRegistrationStep({ 
                email: email.toLowerCase().trim(), 
                password: password 
            });

            // Minor delay for "production feel" UX
            setTimeout(() => {
                window.location.href = "register2.html";
            }, 800);
        };

        // Google Auth
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                saveRegistrationStep({ 
                    email: result.user.email,
                    fullName: result.user.displayName,
                    isGoogle: true
                });
                window.location.href = "register2.html";
            } catch (error) {
                alert("Auth Error: " + error.message);
            }
        };
    </script>
</body>
</html>
