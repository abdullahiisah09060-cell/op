<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA Portal | Identity Registration System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sbaNavy: '#002E6D',
                        sbaBlue: '#0071BC',
                        sbaRed: '#D32F2F',
                        sbaDark: '#1E293B',
                        sbaBg: '#F8FAFC'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .input-focus-fix:focus {
            font-size: 16px !important;
        }
        @media (min-width: 640px) {
            .input-focus-fix:focus {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-4 py-3.5 sm:px-8 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-sbaNavy text-white px-2.5 py-1 font-extrabold text-xl tracking-tight rounded-sm">SBA</div>
            <div class="h-8 w-[1px] bg-slate-200 hidden sm:block"></div>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider leading-tight hidden sm:block">
                U.S. Small Business<br><span class="text-sbaNavy">Administration</span>
            </span>
        </div>
        <a href="login.html" class="text-xs font-bold text-sbaNavy hover:text-sbaBlue transition-colors uppercase tracking-wider border-b-2 border-transparent hover:border-sbaBlue pb-0.5">
            Sign In Account
        </a>
    </nav>

    <!-- Main Registration Box Container -->
    <div class="flex-grow flex items-center justify-center px-4 py-10 sm:py-16">
        <div class="bg-white border-t-4 border-sbaNavy rounded shadow-sm w-full max-w-[440px] p-6 sm:p-10 border border-slate-200">
            
            <!-- Dynamic Step Progress Metric Bar -->
            <div class="flex gap-2.5 mb-8 items-center">
                <div class="h-1 flex-grow rounded-sm bg-sbaNavy"></div>
                <div class="h-1 flex-grow rounded-sm bg-slate-200"></div>
                <div class="h-1 flex-grow rounded-sm bg-slate-200"></div>
            </div>

            <!-- Context Title -->
            <div class="mb-8">
                <h1 class="text-xl font-bold text-sbaDark tracking-tight uppercase">Initialize Secure Case</h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-1">Step 1: Authorization Credentials</p>
            </div>

            <!-- Dynamic Alert Messaging Node Component -->
            <div id="alertBoundary" class="hidden mb-5 p-3.5 rounded border text-xs font-medium flex items-start gap-2.5 transition-all">
                <i id="alertIcon" class="fas mt-0.5"></i>
                <span id="alertMessage"></span>
            </div>

            <!-- Federated Google Authenticators Provider Interface -->
            <button type="button" id="googleRegBtn" class="w-full bg-white border border-slate-200 hover:border-slate-300 text-slate-700 font-semibold text-xs uppercase tracking-wider h-11 px-4 rounded flex items-center justify-center gap-2.5 shadow-sm hover:bg-slate-50 transition-all duration-150">
                <svg class="w-4 h-4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Enroll via Identity Provider</span>
            </button>

            <!-- Layout Separator Grid Elements Section Line -->
            <div class="relative flex py-6 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink mx-4 text-[9px] font-bold text-slate-400 tracking-wider uppercase">Or Secure Manual Provisioning</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <!-- Native Credential Provisioning Dispatcher Subsystem Block -->
            <form id="step1Form" autocomplete="off" novalidate class="space-y-5">
                
                <!-- Registration Email Parameters Field Vector -->
                <div>
                    <label for="email" class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Business Registration Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none text-xs">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" required 
                            class="input-focus-fix w-full h-11 pl-10 pr-3.5 border border-slate-200 rounded text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:border-sbaBlue focus:ring-2 focus:ring-sbaBlue/10 transition-all duration-150" 
                            placeholder="username@corporate.gov">
                    </div>
                </div>

                <!-- Primary Security Token Vector (Password Field Block) -->
                <div>
                    <label for="pass" class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Create Secure Access Key</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none text-xs">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="pass" required minlength="8"
                            class="input-focus-fix w-full h-11 pl-10 pr-10 border border-slate-200 rounded text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:border-sbaBlue focus:ring-2 focus:ring-sbaBlue/10 transition-all duration-150" 
                            placeholder="••••••••">
                        <button type="button" class="togglePasswordVisibility absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 transition-colors text-xs">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Redundant Security Validation Verification Parameter Vector (Confirm Field Block) -->
                <div>
                    <label for="confirm" class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Verify Secure Access Key</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none text-xs">
                            <i class="fas fa-shield-alt"></i>
                        </span>
                        <input type="password" id="confirm" required minlength="8"
                            class="input-focus-fix w-full h-11 pl-10 pr-10 border border-slate-200 rounded text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:border-sbaBlue focus:ring-2 focus:ring-sbaBlue/10 transition-all duration-150" 
                            placeholder="••••••••">
                        <button type="button" class="togglePasswordVisibility absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 transition-colors text-xs">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Terms, Conditions, Compliance System Tracking Checkbox Nodes -->
                <div class="flex items-start gap-2.5 py-1">
                    <input type="checkbox" id="termsCheck" required 
                        class="mt-0.5 w-4 h-4 rounded border-slate-300 text-sbaNavy focus:ring-sbaNavy accent-sbaNavy cursor-pointer">
                    <label for="termsCheck" class="text-[10px] font-bold text-slate-400 uppercase tracking-wide leading-normal select-none cursor-pointer">
                        I hereby authorize authentication and accept the <a href="terms.html" target="_blank" class="text-sbaBlue hover:underline">Privacy & System Security Terms</a> of this authorized institutional environment.
                    </label>
                </div>

                <!-- Process Transition Action Control Module -->
                <button type="submit" id="submitBtn" class="w-full bg-sbaNavy hover:bg-[#001E4A] text-white font-bold text-xs uppercase tracking-wider h-12 rounded shadow-sm flex items-center justify-center gap-2 transition-all duration-150 mt-4">
                    <span>Proceed to Details</span>
                    <i class="fas fa-arrow-right text-[10px]"></i>
                </button>
            </form>

        </div>
    </div>

    <!-- Security Infrastructure Environment Legal Disclaimer Footer -->
    <footer class="bg-white border-t border-slate-200 p-5 text-center mt-auto">
        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.25em] flex items-center justify-center gap-1.5">
            <i class="fas fa-lock text-slate-300"></i> Cryptographic 256-Bit FedRAMP Authenticated Environment
        </p>
    </footer>

    <!-- Execution Engine Script Block Engine Configuration Modules Links System -->
    <script type="module">
        import { auth, saveRegistrationStep } from './firebase-config.js';
        import { signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const alertBoundary = document.getElementById('alertBoundary');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');
        const step1Form = document.getElementById('step1Form');
        const submitBtn = document.getElementById('submitBtn');

        // Dynamic State-Driven Operational Notification Renderer
        function triggerFormAlert(message, type = 'error') {
            alertBoundary.className = "mb-5 p-3.5 rounded border text-xs font-medium flex items-start gap-2.5 transition-all duration-150";
            if (type === 'error') {
                alertBoundary.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
                alertIcon.className = "fas fa-circle-exclamation mt-0.5 text-red-500";
            } else {
                alertBoundary.classList.add('bg-blue-50', 'border-blue-200', 'text-blue-700');
                alertIcon.className = "fas fa-circle-notch fa-spin mt-0.5 text-blue-500";
            }
            alertMessage.textContent = message;
            alertBoundary.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Functional Password Input Field UI Reveal/Hide Interactive Operations Mechanics
        document.querySelectorAll('.togglePasswordVisibility').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const targetInput = this.parentElement.querySelector('input');
                const targetIcon = this.querySelector('i');
                if (targetInput.type === 'password') {
                    targetInput.type = 'text';
                    targetIcon.className = "fas fa-eye-slash";
                } else {
                    targetInput.type = 'password';
                    targetIcon.className = "fas fa-eye";
                }
            });
        });

        // Strict Dynamic Registration Flow Input Dispatch Submit Interception Filtering System
        step1Form.onsubmit = function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('pass').value;
            const confirmInput = document.getElementById('confirm').value;
            const termsChecked = document.getElementById('termsCheck').checked;

            // Operational Boundary Parsing Invariant Rules Checks Execution
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput)) {
                triggerFormAlert("System Invariant Exception: Please provide a valid structured email address context parameter mapping.");
                return;
            }

            if (passwordInput.length < 8) {
                triggerFormAlert("System Invariant Exception: Access Key formatting structure requires an absolute minimum threshold length of 8 alphanumeric combinations.");
                return;
            }

            if (passwordInput !== confirmInput) {
                triggerFormAlert("Data Validation Reconciliation Fault: Key confirmation sequence misaligned. Ensure passwords match perfectly.");
                return;
            }

            if (!termsChecked) {
                triggerFormAlert("Compliance Access Violation Notice: You must explicitly acknowledge compliance tracking to initialize system provisioning profiles.");
                return;
            }

            // Lock Action UI Core Mechanics Elements Layout States
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Initializing Session Security...`;
            triggerFormAlert("Synchronizing parameters. Formatting temporary secure operational cache pipeline matrices...", "processing");

            try {
                // Save formatted variables via native unified structural object payload matching configurations
                saveRegistrationStep({
                    email: emailInput,
                    password: passwordInput,
                    registrationStep: 2,
                    isGoogleAccount: false
                });

                // Advance to registration step two layout profile parameters directly
                window.location.href = "register2.html";
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Proceed to Details</span><i class="fas fa-arrow-right text-[10px]"></i>`;
                triggerFormAlert("Local Storage Compilation Runtime Fault Error Intercept: " + err.message);
            }
        };

        // Federated Third-Party Identity Access Processing Context Gateway Pipeline Engine
        document.getElementById('googleRegBtn').onclick = async function() {
            const provider = new GoogleAuthProvider();
            triggerFormAlert("Contacting external trusted authentication identity directory pipelines...", "processing");
            
            try {
                const res = await signInWithPopup(auth, provider);
                if (res.user && res.user.email) {
                    saveRegistrationStep({
                        email: res.user.email.toLowerCase().trim(),
                        registrationStep: 2,
                        isGoogleAccount: true,
                        uid: res.user.uid
                    });
                    window.location.href = "register2.html";
                } else {
                    throw new Error("Target identity server context packet parameters returned blank elements map.");
                }
            } catch (err) {
                triggerFormAlert("Federated Context Execution System Pipeline Fault Notice: " + err.message);
            }
        };
    </script>
</body>
</html>
