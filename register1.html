<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA | Registration Step 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sba-navy: #002e6d; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: white; border-top: 6px solid var(--sba-navy); box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border-radius: 4px; }
        .input-field { height: 48px; border: 1.5px solid #e2e8f0; width: 100%; padding: 0 12px; outline: none; border-radius: 4px; font-size: 14px; }
        .btn-next { background: var(--sba-navy); height: 50px; color: white; width: 100%; font-weight: 700; text-transform: uppercase; font-size: 12px; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="auth-card p-8">
        <div class="mb-8">
            <h2 class="text-xl font-black text-gray-800 uppercase mb-2">Step 1: Credentials</h2>
            <div class="flex gap-1">
                <div class="h-1.5 w-1/2 bg-[#002e6d] rounded-full"></div>
                <div class="h-1.5 w-1/2 bg-gray-100 rounded-full"></div>
            </div>
        </div>

        <form id="step1Form" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Email Address</label>
                <input type="email" id="email" class="input-field" required placeholder="yourname@example.com">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Create Passkey</label>
                <input type="password" id="pass" class="input-field" required placeholder="••••••••">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Confirm Passkey</label>
                <input type="password" id="confirm" class="input-field" required placeholder="••••••••">
            </div>

            <div class="flex items-start gap-2">
                <input type="checkbox" required class="mt-1 w-4 h-4 accent-[#002e6d]">
                <p class="text-[10px] font-bold text-gray-500 uppercase leading-tight">
                    I agree to the <a href="terms.html" class="text-blue-700">Terms of Service</a> and Privacy Policy.
                </p>
            </div>

            <button type="submit" class="btn-next shadow-lg">Next Step</button>
        </form>
    </div>
    <script>
        document.getElementById('step1Form').onsubmit = (e) => {
            e.preventDefault();
            if(document.getElementById('pass').value !== document.getElementById('confirm').value) return alert("Passwords mismatch!");
            sessionStorage.setItem('reg_email', document.getElementById('email').value);
            sessionStorage.setItem('reg_pass', document.getElementById('pass').value);
            window.location.href = "register2.html";
        };
    </script>
</body>
</html>
