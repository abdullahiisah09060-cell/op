<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Account Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between text-slate-800">

    <!-- Brand Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white font-extrabold px-3 py-1.5 rounded text-sm tracking-wider">CORP</div>
            <span class="text-sm font-semibold text-slate-600 hidden sm:block">Enterprise Solutions</span>
        </div>
        <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition">Sign In</a>
    </header>

    <!-- Main Registration Box -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 rounded-lg shadow-xl w-full max-w-md p-8">
            
            <!-- Progress Bar Block -->
            <div class="flex gap-2 mb-8">
                <div class="h-1 flex-grow rounded bg-blue-600"></div>
                <div class="h-1 flex-grow rounded bg-slate-200"></div>
                <div class="h-1 flex-grow rounded bg-slate-200"></div>
            </div>

            <!-- Header Labels -->
            <div class="mb-6">
                <h2 class="text-xl font-bold text-slate-900 tracking-tight">Create your account</h2>
                <p class="text-xs text-slate-500 mt-1">Step 1: Account credentials</p>
            </div>

            <!-- Standard Registration Fields -->
            <form id="registrationForm" class="space-y-4">
                <div>
                    <label for="email" class="block text-xs font-semibold text-slate-600 uppercase mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full h-11 px-3 border border-slate-300 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm transition" placeholder="you@company.com">
                </div>
                
                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-600 uppercase mb-1">Password</label>
                    <input type="password" id="password" required class="w-full h-11 px-3 border border-slate-300 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm transition" placeholder="••••••••">
                </div>

                <div>
                    <label for="confirmPassword" class="block text-xs font-semibold text-slate-600 uppercase mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" required class="w-full h-11 px-3 border border-slate-300 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm transition" placeholder="••••••••">
                </div>

                <div class="flex items-start gap-2 pt-2">
                    <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 rounded text-blue-600 border-slate-300 accent-blue-600">
                    <label for="terms" class="text-xs text-slate-500 leading-normal">
                        I agree to the standard commercial <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and Privacy Policy.
                    </label>
                </div>

                <button type="submit" class="w-full h-11 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded shadow mt-4 transition">
                    Continue Application
                </button>
            </form>
        </div>
    </main>

    <!-- Standard Footer -->
    <footer class="bg-white border-t border-slate-200 py-4 text-center">
        <p class="text-xs text-slate-400 font-medium tracking-wide">
            &copy; 2026 Enterprise Solutions Inc. All rights reserved.
        </p>
    </footer>

</body>
</html>
