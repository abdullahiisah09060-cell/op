<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card { border-top: 6px solid var(--primary); animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50">

    <div class="bg-slate-200/50 py-2 px-4 flex items-center justify-center gap-2 border-b border-gray-300">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4 shadow-sm" alt="Flag">
        <span class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">Official SBA Authentication Node</span>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-[420px]">
            <div class="text-center mb-8">
                <div class="inline-block p-2 border-2 border-[#002e6d] mb-4">
                    <span class="text-2xl font-black text-[#002e6d] tracking-tighter uppercase">SBA</span>
                </div>
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">Portal Access</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Federal Finance & Case Ledger</p>
            </div>

            <div class="glass-card login-card p-8 shadow-2xl">
                <div id="alertBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-700 text-[11px] font-black uppercase italic animate-pulse"></div>

                <form id="loginForm" class="space-y-5">
                    <button type="button" id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 h-14 rounded-lg text-sm font-bold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
                        <img src="https://www.gstatic.com/lamda/images/google_logo_color_24dp.png" class="w-5" alt="G">
                        Sign in with Google
                    </button>

                    <div class="relative flex py-2 items-center">
                        <div class="flex-grow border-t border-slate-200"></div>
                        <span class="flex-shrink mx-3 text-[9px] font-black text-slate-400 uppercase tracking-widest">OR</span>
                        <div class="flex-grow border-t border-slate-200"></div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Government Email</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="email" id="userEmail" required class="w-full pl-11 pr-4 h-14 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-[#002e6d] focus:bg-white transition-all text-sm" placeholder="user@sba.gov">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Secure Passkey</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="userPass" required class="w-full pl-11 pr-12 h-14 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-[#002e6d] focus:bg-white transition-all text-sm" placeholder="••••••••">
                            <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#002e6d]">
                                <i id="eyeIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="accent-[#002e6d]"> Secure Session
                        </label>
                        <a href="forget-password.html" class="text-blue-700 hover:underline">Forgot Access?</a>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-premium w-full shadow-lg h-14 mt-2">
                        Verify & Authorize Access
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">New Case Officer?</p>
                    <a href="register.html" class="text-[#002e6d] font-black text-[12px] uppercase tracking-[0.2em] hover:text-red-600 transition-all">Initialize Account <i class="fas fa-chevron-right ml-1"></i></a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[9px] text-slate-400 font-bold uppercase tracking-[0.4em]">
        <i class="fas fa-shield-halved mr-2"></i> Encrypted RSA-4096 Secure Node
    </footer>

    <script type="module">
        import { auth, ADMIN_EMAIL } from './firebase-config.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');
        const googleBtn = document.getElementById('googleBtn');

        window.togglePasswordVisibility = function() {
            const passInput = document.getElementById('userPass');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.className = "fas fa-eye-slash";
            } else {
                passInput.type = "password";
                eyeIcon.className = "fas fa-eye";
            }
        };

        const handleAuthSuccess = (email) => {
            if (email === ADMIN_EMAIL) {
                window.location.href = "admin-portal.html";
            } else {
                window.location.href = "welcome.html";
            }
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            const email = document.getElementById('userEmail').value.toLowerCase().trim();
            const pass = document.getElementById('userPass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> AUTHORIZING...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                handleAuthSuccess(userCredential.user.email);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Verify & Authorize Access";
                alertBox.innerText = "AUTH ERROR: " + error.message;
                alertBox.classList.remove('hidden');
            }
        };

        googleBtn.onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                handleAuthSuccess(result.user.email);
            } catch (error) {
                alertBox.innerText = "GOOGLE AUTH ERROR: " + error.message;
                alertBox.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
