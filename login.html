<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sba-navy: #002e6d; --sba-red: #cc0000; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .auth-card { background: white; border-top: 6px solid var(--sba-navy); box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border-radius: 4px; }
        .logo-box { border: 2.5px solid var(--sba-navy); padding: 2px 6px; display: inline-block; position: relative; }
        .logo-box::after { content: ""; position: absolute; bottom: -2.5px; left: -2.5px; width: 60%; height: 2.5px; background: var(--sba-red); }
        .input-field { height: 48px; border: 1.5px solid #e2e8f0; width: 100%; padding: 0 12px; outline: none; transition: 0.2s; border-radius: 4px; }
        .input-field:focus { border-color: var(--sba-navy); box-shadow: 0 0 0 3px rgba(0, 46, 109, 0.1); }
        .btn-sba { background: var(--sba-navy); height: 50px; font-weight: 700; color: white; width: 100%; border-radius: 4px; transition: 0.3s; text-transform: uppercase; }
        .btn-google { border: 1.5px solid #e2e8f0; height: 48px; width: 100%; font-weight: 600; border-radius: 4px; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; }
    </style>
</head>
<body class="bg-[#f0f2f5]">
    <div class="bg-[#f8f9fa] border-b py-2 px-4 flex items-center gap-2">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4" alt="USA">
        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Official website of the U.S. Government</span>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="auth-card p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="logo-box"><span class="text-2xl font-black text-[#002e6d]">SBA</span></div>
                <div class="leading-tight text-[10px] font-bold text-gray-500 uppercase">
                    <p>U.S. Small Business</p><p>Administration</p>
                </div>
            </div>

            <h2 class="text-xl font-black text-gray-800 mb-6 uppercase">Sign In</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Email Address</label>
                    <input type="email" id="email" class="input-field" required placeholder="name@agency.gov">
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Passkey</label>
                        <a href="forgot-password.html" class="text-[10px] font-bold text-blue-700 uppercase">Forgot?</a>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" class="input-field pr-10" required placeholder="••••••••">
                        <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="w-4 h-4 accent-[#002e6d]">
                    <label for="remember" class="text-[11px] font-bold text-gray-500 uppercase">Remember this device</label>
                </div>

                <button type="submit" id="loginBtn" class="btn-sba shadow-lg">Access Portal</button>

                <div class="relative flex py-3 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-[10px] font-bold text-gray-300">OR</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <button type="button" id="googleBtn" class="btn-google shadow-sm">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5">
                    <span class="text-xs uppercase">Continue with Google</span>
                </button>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-gray-50">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">New Case?</p>
                <a href="register1.html" class="text-[#002e6d] font-bold text-xs uppercase hover:underline">Register Account</a>
            </div>
        </div>
    </main>
    <script>
        function togglePass() {
            const p = document.getElementById('password');
            const i = document.getElementById('eyeIcon');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }
    </script>
</body>
</html>
