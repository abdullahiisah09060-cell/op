<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA Portal | Secure Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-card { border-top: 6px solid var(--sba-blue); }
        .btn-sba { background: var(--sba-blue); transition: 0.3s; }
        .btn-sba:hover { background: #001a3d; box-shadow: 0 4px 15px rgba(0,46,109,0.3); }
        input::placeholder { font-size: 14px; opacity: 0.6; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50">

    <div class="bg-[#f1f1f1] py-2 px-4 flex items-center justify-center gap-2 border-b border-gray-200">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4" alt="Flag">
        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.2em]">Official Government Secure Node</span>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-[400px] animate-up">
            <div class="text-center mb-8">
                <div class="inline-block px-4 py-1 border-2 border-[#002e6d] mb-4">
                    <span class="text-2xl font-black text-[#002e6d] tracking-tighter">SBA</span>
                </div>
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">Access Portal</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Federal Finance & Case Ledger</p>
            </div>

            <div class="card p-8 shadow-2xl">
                <div id="alertBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-700 text-[11px] font-black uppercase italic"></div>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Registration Email</label>
                        <input type="email" id="userEmail" required class="bg-white" placeholder="name@example.com">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Security Passkey</label>
                        <div class="relative flex items-center">
                            <input type="password" id="userPass" required class="bg-white pr-12" placeholder="••••••••">
                            <span class="absolute right-4 text-slate-400 cursor-pointer" onclick="togglePasswordVisibility()">
                                <i id="eyeIcon" class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-3 h-3 rounded accent-[#002e6d]"> Remember
                        </label>
                        <a href="forget-password.html" class="text-blue-700 hover:underline">Lost Access?</a>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-main mt-4">
                        Verify & Authorize
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-3">No active case file?</p>
                    <a href="register.html" class="text-[#002e6d] font-black text-[12px] uppercase tracking-widest hover:text-red-600">
                        Initialize New Account <i class="fas fa-arrow-right ml-1"></i>
                    </a>
                </div>
            </div>
            
            <p class="mt-10 text-center text-[9px] text-slate-400 font-bold uppercase tracking-[0.3em]">
                <i class="fas fa-shield-alt mr-1"></i> 256-Bit SSL Encrypted Connection
            </p>
        </div>
    </main>

    <script type="module">
        import { auth, db, saveUserSession } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const ADMIN_EMAIL = "sba.support@gmail.com";
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');

        window.togglePasswordVisibility = function() {
            const passInput = document.getElementById('userPass');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.className = "fas fa-eye-slash";
            } else {
                passInput.type = "password";
                eyeIcon.className = "fas fa-eye";
            }
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            
            const email = document.getElementById('userEmail').value.toLowerCase().trim();
            const pass = document.getElementById('userPass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> AUTHORIZING...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // Fetch user data from Firestore to save in session
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    saveUserSession(userDoc.data());
                }

                // Redirect based on Admin status
                if (email === ADMIN_EMAIL) {
                    window.location.href = "admin-portal.html";
                } else {
                    window.location.href = "dashboard.html";
                }
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Verify & Authorize";
                alertBox.innerText = "ACCESS DENIED: " + error.code.split('/')[1].replace(/-/g, ' ');
                alertBox.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
